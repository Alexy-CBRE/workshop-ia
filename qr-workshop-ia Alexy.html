<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QR Code — Workshop IA</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: #f5f5f3; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  .card { background: #fff; border-radius: 24px; padding: 40px 48px; text-align: center; box-shadow: 0 4px 32px rgba(0,0,0,0.08); max-width: 420px; width: 100%; }
  .eyebrow { font-size: 11px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: #aaa; margin-bottom: 12px; }
  h2 { font-size: 22px; font-weight: 700; color: #111; margin-bottom: 6px; }
  .subtitle { font-size: 14px; color: #888; margin-bottom: 28px; line-height: 1.5; }
  #qr { margin: 0 auto 24px; display: flex; align-items: center; justify-content: center; }
  .steps { text-align: left; background: #f9f9f7; border-radius: 12px; padding: 16px 20px; margin-top: 20px; }
  .step { font-size: 13px; color: #555; padding: 5px 0; display: flex; gap: 10px; }
  .step-num { font-weight: 700; color: #111; flex-shrink: 0; }
  .url { font-size: 11px; color: #ccc; margin-top: 16px; }
</style>
</head>
<body>
<div class="card">
  <div class="eyebrow">Workshop IA · CBRE GWS</div>
  <h2>📱 Scanne pour rejoindre</h2>
  <div class="subtitle">Réponds aux questions et découvre<br>ton groupe en 2 minutes</div>
  <div id="qr"></div>
  <div class="steps">
    <div class="step"><span class="step-num">1.</span> Scanne le QR code avec ton téléphone</div>
    <div class="step"><span class="step-num">2.</span> Réponds aux 7 questions</div>
    <div class="step"><span class="step-num">3.</span> Ton groupe s'affiche automatiquement</div>
  </div>
  <div class="url">cbre-my.sharepoint.com · Workshop IA</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
  new QRCode(document.getElementById('qr'), {
    text: 'https://cbre-my.sharepoint.com/:u:/p/alexy_grafeille/IQBQtCgj6ZlKQKvOZUUTob9oASsnkgQo77cl6ZvZqmEzBGo?e=HRNJt1',
    width: 220,
    height: 220,
    colorDark: '#111111',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.M
  });
</script>
</body>
</html>
